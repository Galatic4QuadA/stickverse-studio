<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stickverse Studio</title>
<style>
  body { margin:0; overflow:hidden; background:#111; }
  canvas { display:block; margin:0 auto; background:#222; }
</style>
</head>
<body>
<canvas id="gameCanvas" width="1200" height="600"></canvas>

<script>
// ===== Stickverse Studio Engine =====
// Self-contained HTML version

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const powers = [
  { name: "Chrono-Absorption", domain: "The Temporal Rift", look: "glowing clocks aura" },
  { name: "Quantum Perception", domain: "The Endless Possibilities", look: "multidimensional eyes" },
  { name: "Material Transmutation", domain: "The Alchemist's Lair", look: "glowing patterns on objects" },
  { name: "Tactile Teleportation", domain: "The Touching Void", look: "ghostly afterimages" },
  { name: "Force of Will", domain: "The Unyielding Fortress", look: "environment warp aura" },
  { name: "Shadow Puppeteering", domain: "The Darkened Theater", look: "living shadow constructs" },
  { name: "Sonic Mimicry", domain: "The Echoing Abyss", look: "vibrating air ripples" },
  { name: "Chameleon Skin", domain: "The Camouflage Zone", look: "skin blends with environment" },
  { name: "Biorhythm Manipulation", domain: "The Pulse Chamber", look: "rhythmic aura pulse" },
  { name: "Ink Manifestation", domain: "The Living Canvas", look: "swirling inky constructs" },
  // ...add all 50 powers/domains/looks here
];

const sounds = {
  laser: new Audio("https://freesound.org/data/previews/331/331912_3248244-lq.mp3"),
  ultimate: new Audio("https://freesound.org/data/previews/82/82818_1022650-lq.mp3"),
  clash: new Audio("https://freesound.org/data/previews/33/33749_3248244-lq.mp3"),
};

class Stickman {
  constructor(name, x, y) {
    this.name = name;
    this.x = x;
    this.y = y;
    this.color = "#fff";
    this.size = 20;
    this.health = 100;
    this.power = powers[Math.floor(Math.random()*powers.length)];
    this.ultimateCharge = 0;
    this.isUltimate = false;
    this.fusion = null;
  }

  draw() {
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = "#0ff";
    ctx.stroke();
  }

  attack(target) {
    let hit = Math.random()*20;
    target.health -= hit;
    this.ultimateCharge += 5;
    sounds.laser.play();
    if(this.ultimateCharge >= 100) this.ultimate(target);
  }

  ultimate(target) {
    this.isUltimate = true;
    this.ultimateCharge = 0;
    target.health -= 50;
    sounds.ultimate.play();
    ctx.fillStyle = "rgba(255,255,0,0.3)";
    ctx.beginPath();
    ctx.arc(this.x, this.y, 80, 0, Math.PI*2);
    ctx.fill();
  }

  fusionWith(other) {
    this.fusion = other.name;
    this.color = "#f0f";
    this.size += 10;
    this.ultimateCharge = 50;
  }
}

// Initialize stickmen
let stickmen = [
  new Stickman("KJ", 200, 300),
  new Stickman("Gojo", 1000, 300)
];

// Game loop
function gameLoop() {
  ctx.clearRect(0,0,canvas.width, canvas.height);

  stickmen.forEach(sm => sm.draw());

  stickmen.forEach(sm => {
    let target = stickmen[Math.floor(Math.random()*stickmen.length)];
    if(target!==sm) sm.attack(target);
  });

  stickmen = stickmen.filter(sm => sm.health > 0);

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
