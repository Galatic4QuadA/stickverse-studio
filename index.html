<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stickverse Studio - LEVEL 8 EPIC CINEMATIC MODE</title>
<style>
body {margin:0; font-family: Arial, sans-serif; background:#000020; color:white; overflow:hidden;}
header {text-align:center; padding:20px; font-size:2em; font-weight:bold; border-bottom:2px solid #fff;}
.tabs {display:flex; justify-content:center; flex-wrap:wrap; margin:20px 0;}
.tab {padding:10px 20px; margin:5px; background:#2a0055; cursor:pointer; border-radius:8px; transition:.3s;}
.tab:hover{background:#7b1fa2;}
.active-tab{background:#ff00ff;}
.content {max-width:1400px; margin:auto; padding:20px; background:rgba(0,0,0,0.6); border-radius:12px;}
.section{margin-bottom:30px;}
input, select, button, textarea {margin:5px 0; padding:8px; border-radius:6px; border:none; width:100%;}
.character-card {background: rgba(255,255,255,0.1); padding:15px; margin:10px 0; border-radius:10px;}
.animation-area {height:350px; background: rgba(255,255,255,0.05); border:2px dashed #fff; border-radius:12px; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:bold; white-space:pre-wrap; font-size:1.1em;}
.dialogue-area {background: rgba(255,255,255,0.1); padding:10px; border-radius:8px; margin-top:10px; min-height:100px; white-space:pre-wrap; overflow-y:auto;}
.final-boss {background:red; padding:20px; border-radius:12px; margin-top:20px; text-align:center; font-weight:bold; font-size:1.5em; position:relative;}
.health-bar {height:25px; background:#222; border-radius:8px; overflow:hidden; margin-top:5px;}
.health-bar-inner {height:100%; background:lime; width:100%; transition:width .3s;}
.mana-bar-inner {height:100%; background:blue; width:100%; transition:width .3s;}
.battle-arena {position:relative; height:500px; background:#111; border-radius:12px; overflow:hidden; margin-top:20px;}
.stick-char {position:absolute; bottom:10px; width:40px; height:80px; background:#fff; border-radius:5px; display:flex; align-items:flex-end; justify-content:center; color:#000; font-size:12px; font-weight:bold;}
.attack-effect {position:absolute; border-radius:50%; pointer-events:none; transition: all .3s;}
.platform {position:absolute; background:#333; height:10px; border-radius:5px;}
</style>
</head>
<body>
<header>Stickverse Studio - LEVEL 8 EPIC CINEMATIC MODE</header>
<div class="tabs">
  <div class="tab active-tab" onclick="openTab('characters')">Characters</div>
  <div class="tab" onclick="openTab('powers')">Powers & Domains</div>
  <div class="tab" onclick="openTab('animations')">Animations</div>
  <div class="tab" onclick="openTab('dialogues')">Dialogue</div>
  <div class="tab" onclick="openTab('finalboss')">Final Boss</div>
</div>
<div class="content">
  <div id="characters" class="tab-content">
    <div class="section">
      <h3>Create Character</h3>
      <input type="text" id="charName" placeholder="Character Name">
      <input type="text" id="charLook" placeholder="Looks / Appearance">
      <button onclick="addCharacter()">Add Character</button>
    </div>
    <div class="section" id="charactersList"><h3>Character List</h3></div>
  </div>

  <div id="powers" class="tab-content" style="display:none;">
    <div class="section">
      <h3>Select Power & Domain</h3>
      <select id="selectCharacter"><option value="">Select Character</option></select>
      <select id="selectPower"></select>
      <select id="selectDomain"></select>
      <textarea id="customDesc" placeholder="Add Description/Effect"></textarea>
      <button onclick="assignPowerDomain()">Assign</button>
    </div>
    <div class="section" id="assignedList"><h3>Assigned Powers & Domains</h3></div>
  </div>

  <div id="animations" class="tab-content" style="display:none;">
    <div class="section">
      <h3>Create Animation</h3>
      <select id="animationCharacter" multiple></select>
      <textarea id="animationDesc" placeholder="Animation Description"></textarea>
      <button onclick="generateAnimation()">Generate Animation</button>
      <button onclick="smartSuggest()">AI Suggest Animation</button>
    </div>
    <div class="animation-area" id="animationArea">Animation Preview</div>
  </div>

  <div id="dialogues" class="tab-content" style="display:none;">
    <div class="section">
      <h3>Record Dialogue (TTS Simulation)</h3>
      <select id="dialogueCharacter"><option value="">Select Character</option></select>
      <textarea id="dialogueText" placeholder="Type dialogue here"></textarea>
      <button onclick="addDialogue()">Add Dialogue</button>
      <button onclick="playDialogue()">Play Dialogue</button>
</html>
